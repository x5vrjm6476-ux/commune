<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COMMUNE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-menu" class="overlay">
        <h1 id="title" class="cute-title">COMMUNE</h1>
        <div class="menu-buttons">
            <button id="btn-new-world" class="pixel-btn large">Neue Welt</button>
            <button id="btn-load-world" class="pixel-btn large">Welt laden</button>
        </div>
        <div class="menu-small-buttons">
            <button id="btn-export" class="pixel-btn small">Exportieren</button>
            <button id="btn-import" class="pixel-btn small">Importieren</button>
            <input type="file" id="import-file" style="display: none;" accept=".commune">
        </div>
    </div>

    <div id="needs-indicator" class="status-100 hidden"></div>

    <div id="needs-panel" class="pixel-panel hidden">
        <h3>Geist-Sicht</h3>
        <div class="need-row"><span>Raum:</span> <div id="bar-space" class="pixel-bar"></div></div>
        <div class="need-row"><span>Ressourcen:</span> <div id="bar-resources" class="pixel-bar"></div></div>
        <div class="need-row"><span>Verbindung:</span> <div id="bar-connection" class="pixel-bar"></div></div>
        <p id="needs-hint" class="pixel-hint">Die Welt atmet ruhig.</p>
        <button id="btn-close-needs" class="pixel-btn small">Schliessen</button>
    </div>

    <div id="decision-dialog" class="pixel-panel hidden">
        <h3 id="decision-title">Entdeckung!</h3>
        <p id="decision-text">Du hast etwas im Nebel gefunden.</p>
        <div class="decision-buttons">
            <button id="btn-decision-a" class="pixel-btn">Option A</button>
            <button id="btn-decision-b" class="pixel-btn">Option B</button>
        </div>
    </div>

    <div id="merge-dialog" class="pixel-panel hidden">
        <h3>Fremder Stamm</h3>
        <p>Eine andere Siedlung. Sie grüssen friedlich.</p>
        <button id="btn-merge-accept" class="pixel-btn">Wissen teilen</button>
        <button id="btn-merge-later" class="pixel-btn">Beobachten</button>
    </div>

    <div id="game-container">
        <canvas id="game-canvas"></canvas>
    </div>

    <div id="ios-pixel-dock" class="hidden">
        <button id="btn-explore" class="dock-btn active">Erkunden</button>
        <button id="btn-menu-open" class="dock-btn">Menü</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
